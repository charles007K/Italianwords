<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dettato Italiano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f7f5f0;
  --surface:  #ffffff;
  --surface2: #f0ede6;
  --border:   #e2ddd5;
  --border2:  #ccc8be;
  --text:     #2c2925;
  --muted:    #9b9590;
  --accent:   #4a7c6f;
  --accent-lt:#e8f0ee;
  --correct:  #3d7a55;
  --correct-lt:#e6f2eb;
  --wrong:    #b5483a;
  --wrong-lt: #faeae8;
  --progress: #4a7c6f;
  --serif:    'Lora', Georgia, serif;
  --sans:     'DM Sans', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 600px;
  padding: 0 20px 80px;
}

/* HEADER */
header {
  padding: 52px 0 36px;
  text-align: center;
}
.logo {
  font-family: var(--serif);
  font-size: clamp(26px, 5.5vw, 38px);
  font-style: italic;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.01em;
}
.logo em {
  color: var(--accent);
  font-style: italic;
}
.subtitle {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
}
.header-line {
  width: 32px;
  height: 1px;
  background: var(--border2);
  margin: 20px auto 0;
}

/* STATS */
.stats-bar {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.stat-chip {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
}
.stat-chip b {
  color: var(--accent);
  font-weight: 500;
}

/* START SCREEN */
#screen-start { display: flex; flex-direction: column; gap: 14px; }

.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.group-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}

.group-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 18px 12px 14px;
  cursor: pointer;
  border-radius: 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.18s, background 0.18s, transform 0.12s, box-shadow 0.18s;
}
.group-btn:hover {
  border-color: var(--accent);
  background: var(--accent-lt);
  box-shadow: 0 2px 12px rgba(74,124,111,0.10);
  transform: translateY(-1px);
}
.group-btn:active { transform: scale(0.96) translateY(0); }
.group-btn .g-num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  display: block;
  margin-bottom: 4px;
  color: var(--text);
}
.group-btn .g-range {
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
}
.group-btn .g-acc {
  display: block;
  font-size: 11px;
  font-weight: 500;
  margin-top: 4px;
  color: var(--accent);
}
.group-btn.done {
  border-color: #b8d8c8;
  background: #f2f9f5;
}
.group-btn.done .g-num { color: var(--correct); }
.group-btn.done .g-range { color: #7ab899; }
.group-btn.done::after {
  content: '';
  position: absolute;
  top: 8px; right: 8px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--correct);
}
.group-btn.partial {
  border-style: dashed;
}
.group-btn .g-count {
  display: block;
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
  margin-top: 3px;
}

.btn-clear {
  margin-top: 4px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 10px 24px;
  cursor: pointer;
  border-radius: 8px;
  width: 100%;
  transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
}
.btn-clear:hover { border-color: var(--wrong); color: var(--wrong); background: var(--wrong-lt); }
.btn-clear:active { transform: scale(0.98); }

/* QUIZ SCREEN */
#screen-quiz { display: none; flex-direction: column; gap: 0; }

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.quiz-group-label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.quiz-progress {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
}
.quiz-progress b { color: var(--text); font-weight: 500; }

.progress-track {
  width: 100%;
  height: 3px;
  background: var(--border);
  margin-bottom: 28px;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--progress);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

/* QUIZ CARD */
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 32px 28px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
  box-shadow: 0 1px 4px rgba(44,41,37,0.05);
}
.quiz-card.correct {
  border-color: #a8d5bb;
  background: #fafef9;
  box-shadow: 0 2px 16px rgba(61,122,85,0.08);
}
.quiz-card.wrong {
  border-color: #e8b4ae;
  background: #fffafa;
  box-shadow: 0 2px 16px rgba(181,72,58,0.08);
}

/* top accent bar */
.quiz-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #7ab8a8);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  border-radius: 16px 16px 0 0;
}
.quiz-card.revealed::before { transform: scaleX(1); }

.chinese-word {
  font-family: var(--serif);
  font-size: clamp(40px, 9vw, 68px);
  font-weight: 600;
  font-style: italic;
  color: var(--text);
  line-height: 1;
  margin-bottom: 28px;
  letter-spacing: -0.02em;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}

.answer-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 400;
  padding: 12px 16px;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.02em;
}
.answer-input::placeholder { color: var(--muted); font-weight: 300; }
.answer-input:focus { border-color: var(--accent); background: #fff; }
.answer-input.correct-input {
  border-color: var(--correct);
  background: var(--correct-lt);
  color: var(--correct);
}
.answer-input.wrong-input {
  border-color: var(--wrong);
  background: var(--wrong-lt);
  color: var(--wrong);
}

.btn-submit {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 12px 20px;
  cursor: pointer;
  border-radius: 10px;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(74,124,111,0.25);
}
.btn-submit:hover {
  background: #3d6e62;
  box-shadow: 0 4px 14px rgba(74,124,111,0.30);
  transform: translateY(-1px);
}
.btn-submit:active {
  transform: scale(0.93) translateY(0);
  box-shadow: 0 1px 4px rgba(74,124,111,0.20);
}

/* ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: ripple-anim 0.55s ease-out;
  pointer-events: none;
}
@keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

.feedback-row {
  min-height: 26px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  font-size: 14px;
  font-weight: 500;
}
.feedback-correct { color: var(--correct); }
.feedback-wrong { color: var(--wrong); }
.correct-answer {
  color: var(--muted);
  font-size: 13px;
  font-weight: 400;
}

/* SHAKE */
@keyframes shake {
  0%   { transform: translateX(0); }
  12%  { transform: translateX(-9px) rotate(-1deg); }
  24%  { transform: translateX(9px) rotate(1deg); }
  38%  { transform: translateX(-7px) rotate(-0.6deg); }
  52%  { transform: translateX(7px) rotate(0.6deg); }
  66%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.shake { animation: shake 0.48s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

/* POP */
@keyframes pop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.05) rotate(-0.4deg); }
  65%  { transform: scale(0.975); }
  100% { transform: scale(1); }
}
.pop { animation: pop 0.38s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* SLIDE */
@keyframes slide-in-right {
  from { opacity: 0; transform: translateX(36px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slide-in-left {
  from { opacity: 0; transform: translateX(-36px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide-right { animation: slide-in-right 0.32s cubic-bezier(0.22, 1, 0.36, 1); }
.slide-left  { animation: slide-in-left  0.32s cubic-bezier(0.22, 1, 0.36, 1); }

/* NAV */
.quiz-nav { display: flex; gap: 8px; margin-top: 4px; }
.btn-nav {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 11px;
  cursor: pointer;
  border-radius: 8px;
  transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
  text-transform: uppercase;
}
.btn-nav:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.btn-nav:active { transform: scale(0.96); }
.btn-nav.primary {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-lt);
}
.btn-nav.primary:hover { background: #daeee9; border-color: #3d6e62; }

/* RESULT */
#screen-result {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px 0;
  gap: 20px;
}
.result-ring {
  position: relative;
  width: 140px; height: 140px;
  margin-bottom: 4px;
}
.result-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
.ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 339.3;
  stroke-dashoffset: 339.3;
  transition: stroke-dashoffset 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.ring-fill.perfect { stroke: var(--correct); }
.ring-fill.good    { stroke: var(--accent); }
.ring-fill.ok      { stroke: #c0a060; }
.ring-fill.bad     { stroke: var(--wrong); }
.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-pct {
  font-family: var(--serif);
  font-size: 32px;
  font-style: italic;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}
.ring-label {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-top: 3px;
}
.result-title {
  font-family: var(--serif);
  font-size: 26px;
  font-style: italic;
  font-weight: 400;
  color: var(--text);
}
.result-detail {
  font-size: 13px;
  color: var(--muted);
  font-weight: 300;
  line-height: 2;
}
.result-detail b { color: var(--text); font-weight: 500; }

.wrong-list {
  width: 100%;
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.wrong-list-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.wrong-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  gap: 12px;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-cn { color: var(--text); font-weight: 400; min-width: 40px; }
.wrong-right { color: var(--correct); font-weight: 500; }
.wrong-typed { color: var(--wrong); font-size: 12px; font-weight: 300; }

.result-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.btn-result {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 12px 32px;
  cursor: pointer;
  border-radius: 8px;
  text-transform: uppercase;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.btn-result:hover { background: var(--surface2); border-color: var(--accent); }
.btn-result:active { transform: scale(0.96); }
.btn-result.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-result.primary:hover { background: #3d6e62; border-color: #3d6e62; }

/* LOADING */
#screen-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 0;
  gap: 14px;
}
.loading-dots { display: flex; gap: 7px; }
.loading-dot {
  width: 7px; height: 7px;
  background: var(--border2);
  border-radius: 50%;
  animation: dot-pulse 1.1s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.18s; }
.loading-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes dot-pulse {
  0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
  40% { transform: scale(1); opacity: 1; background: var(--accent); }
}
.loading-text {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

/* DIALOG */
.dialog-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,41,37,0.35);
  backdrop-filter: blur(2px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.dialog-overlay.open { display: flex; }
.dialog-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(44,41,37,0.12);
  animation: pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.dialog-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--wrong);
  margin-bottom: 10px;
}
.dialog-body {
  font-size: 14px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1.7;
  margin-bottom: 22px;
}
.dialog-btns { display: flex; gap: 8px; }
.dialog-btns button {
  flex: 1;
  padding: 11px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  transition: background 0.15s, transform 0.1s;
}
.dialog-btns button:active { transform: scale(0.95); }
.dialog-btns .btn-confirm {
  border-color: var(--wrong);
  color: var(--wrong);
}
.dialog-btns .btn-confirm:hover { background: var(--wrong-lt); }

/* CONFETTI */
.confetti-piece {
  position: fixed;
  width: 7px; height: 7px;
  top: -10px;
  pointer-events: none;
  z-index: 9999;
  animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  88%  { opacity: 1; }
  100% { transform: translateY(105vh) rotate(700deg); opacity: 0; }
}

/* HEATMAP */
.heatmap-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 20px 16px;
  margin-bottom: 4px;
}
.heatmap-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}
.heatmap-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}
.heatmap-streak {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
}
.heatmap-streak b { color: var(--accent); font-weight: 500; }
.heatmap-body {
  display: flex;
  gap: 0;
}
.heatmap-days-col {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  margin-right: 5px;
}
.heatmap-day-label {
  font-size: 9px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1;
  height: 11px;
  display: flex;
  align-items: center;
}
.heatmap-grid {
  display: flex;
  gap: 3px;
  flex: 1;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.heatmap-grid::-webkit-scrollbar { display: none; }
.heatmap-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 0 0 auto;
}
.heatmap-col-label {
  font-size: 9px;
  color: var(--muted);
  font-weight: 300;
  text-align: center;
  height: 13px;
  line-height: 13px;
  margin-bottom: 2px;
}
.heatmap-cell {
  width: 11px;
  height: 11px;
  border-radius: 2.5px;
  background: var(--surface2);
  cursor: default;
  transition: transform 0.12s;
  position: relative;
}
.heatmap-cell:hover { transform: scale(1.4); z-index: 2; }
.heatmap-cell[data-level="1"] { background: #c8e6d8; }
.heatmap-cell[data-level="2"] { background: #8ecdb0; }
.heatmap-cell[data-level="3"] { background: #4a7c6f; }
.heatmap-cell[data-level="4"] { background: #2d5a50; }
.heatmap-cell::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  font-size: 10px;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 5px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  font-family: var(--sans);
}
.heatmap-cell:hover::after { opacity: 1; }
.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 4px;
  justify-content: flex-end;
  margin-top: 10px;
}
.heatmap-legend-label {
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
}
.heatmap-legend-cell {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* RANDOM MODE BUTTON */
.btn-random-mode {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1.5px solid var(--accent);
  border-radius: 14px;
  padding: 18px 20px;
  cursor: pointer;
  width: 100%;
  font-family: var(--sans);
  text-align: left;

@media (max-width: 480px) {

</head>
<body>
<div class="app">

  <header>
    <div class="logo">Dett<em>a</em>to</div>
    <div class="subtitle">Vocabolario Italiano · 意大利语默写</div>
    <div class="header-line"></div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip">已完成 <b id="stat-done">0</b> 组</div>
    <div class="stat-chip">综合正确率 <b id="stat-acc">—</b></div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading">
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <div class="loading-text">Caricamento in corso</div>
  </div>

  <!-- START -->
  <div id="screen-start" style="display:none">
    <!-- HEATMAP -->
    <div class="heatmap-wrap">
      <div class="heatmap-top">
        <div class="heatmap-title">Attivit&#224;</div>
        <div class="heatmap-streak" id="heatmap-streak"></div>
      </div>
      <div class="heatmap-body">
        <div class="heatmap-days-col" id="heatmap-day-labels"></div>
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
      <div class="heatmap-legend">
        <div class="heatmap-legend-cell" style="background:var(--surface2)"></div>
        <div class="heatmap-legend-cell" style="background:#c8e6d8"></div>
        <div class="heatmap-legend-cell" style="background:#8ecdb0"></div>
        <div class="heatmap-legend-cell" style="background:#4a7c6f"></div>
        <div class="heatmap-legend-cell" style="background:#2d5a50"></div>
      </div>
    </div>

    <div class="section-label" style="margin-top:8px">模式选择</div>
    <button class="btn-random-mode" onclick="startRandomMode(event)">
      <div class="rm-left">
        <div class="rm-title">🎲 随机默写</div>
        <div class="rm-sub">从全部词库随机抽取 10 个单词</div>
      </div>
      <div class="rm-icon">→</div>
    </button>

    <div class="section-label" style="margin-top:8px">Scegli un gruppo</div>
    <div class="group-grid" id="group-grid"></div>
    <button class="btn-clear" onclick="openClearDialog()">Cancella tutti i progressi</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-group-label" id="quiz-group-label"></div>

    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="quiz-card" id="quiz-card">

      <div class="input-row">
        <input class="answer-input" id="answer-input" type="text"
               placeholder="Scrivi in italiano…"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="btn-submit" id="btn-submit" onclick="handleSubmit(event)">Conferma</button>
      </div>
      <div class="feedback-row" id="feedback-row"></div>
    </div>

    <div class="quiz-nav">
      <button class="btn-nav" onclick="goBack()">Torna indietro</button>
      <button class="btn-nav primary" id="btn-next" onclick="nextWord()" style="display:none">Prossima parola</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result">
    <div class="result-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle class="ring-bg" cx="70" cy="70" r="54"/>
        <circle class="ring-fill" id="ring-fill" cx="70" cy="70" r="54"/>
      </svg>
      <div class="ring-text">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-label">correttezza</div>
      </div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-detail" id="result-detail"></div>
    <div class="wrong-list" id="wrong-list" style="display:none">
      <div class="wrong-list-title">Parole sbagliate</div>
      <div id="wrong-items"></div>
    </div>
    <div class="result-btns">
      <button class="btn-result primary" onclick="retryGroup()">Riprova</button>
      <button class="btn-result" id="btn-random-again" onclick="startRandomMode(null)" style="display:none">再随机一次</button>
      <button class="btn-result" onclick="goHome()">Torna alla lista</button>
    </div>
  </div>

</div>

<!-- DIALOG -->
<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog-box">
    <div class="dialog-title">Attenzione</div>
    <div class="dialog-body">Tutti i progressi salvati verranno eliminati. L'operazione è irreversibile.</div>
    <div class="dialog-btns">
      <button onclick="closeClearDialog()">Annulla</button>
      <button class="btn-confirm" onclick="clearCache()">Conferma</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'dettato_v2';
const GROUP_SIZE = 10;
const RANDOM_COUNT = 10;   // words to pick per random session
let allWords = [];
let state = {};
let currentGroup = null;
let currentWords = [];
let currentIndex = 0;
let answers = [];
let revealed = false;
let isRandomMode = false;  // true when in random quiz mode

// ---------- STORAGE ----------
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function openClearDialog() { document.getElementById('dialog-overlay').classList.add('open'); }
function closeClearDialog() { document.getElementById('dialog-overlay').classList.remove('open'); }
function clearCache() {
  localStorage.removeItem(STORAGE_KEY);
  state = {};
  closeClearDialog();
  renderGroups();
  updateStats();
  renderHeatmap();
}

// ---------- CSV ----------
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const words = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',');
    if (parts.length >= 2) {
      const cn = parts[0].trim();
      const it = parts.slice(1).join(',').trim();
      if (cn && it) words.push({ cn, it });
    }
  }
  return words;
}

async function loadWords() {
  try {
    const resp = await fetch('./word.csv');
    if (!resp.ok) throw new Error();
    allWords = parseCSV(await resp.text());
  } catch {
    allWords = [
      {cn:'我',it:'io'},{cn:'你',it:'tu'},{cn:'他',it:'lui'},{cn:'她',it:'lei'},
      {cn:'我们',it:'noi'},{cn:'你们',it:'voi'},{cn:'他们',it:'loro'},{cn:'给',it:'dare'},
      {cn:'说',it:'dire'},{cn:'问',it:'chiedere'}
    ];
  }
  state = loadState();
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-start').style.display = 'flex';
  renderGroups();
  updateStats();
  renderHeatmap();
}

// ---------- GROUPS ----------
function getGroups() {
  const g = [];
  for (let i = 0; i < allWords.length; i += GROUP_SIZE)
    g.push(allWords.slice(i, i + GROUP_SIZE));
  return g;
}

function renderGroups() {
  const groups = getGroups();
  const grid = document.getElementById('group-grid');
  grid.innerHTML = '';
  groups.forEach((words, idx) => {
    const start = idx * GROUP_SIZE + 1;
    const end = start + GROUP_SIZE - 1;          // always show fixed range
    const actualEnd = idx * GROUP_SIZE + words.length; // real last word number
    const key = `group_${idx}`;
    const rec = state[key];
    const done = rec && rec.completed;
    const acc = rec && rec.accuracy != null ? Math.round(rec.accuracy * 100) + '%' : '';
    const partial = words.length < GROUP_SIZE;   // last group not yet full
    const btn = document.createElement('button');
    btn.className = 'group-btn' + (done ? ' done' : '') + (partial ? ' partial' : '');
    btn.innerHTML =
      `<span class="g-num">${idx + 1}</span>` +
      `<span class="g-range">${start}–${end}</span>` +
      (partial ? `<span class="g-count">${words.length} / ${GROUP_SIZE} parole</span>` : '') +
      (acc ? `<span class="g-acc">${acc}</span>` : '');
    btn.addEventListener('click', e => {
      addRipple(btn, e);
      setTimeout(() => startGroup(idx), 110);
    });
    grid.appendChild(btn);
  });
}

function updateStats() {
  const groups = getGroups();
  let doneCount = 0, totalCorrect = 0, totalAnswered = 0;
  groups.forEach((_, idx) => {
    const rec = state[`group_${idx}`];
    if (rec && rec.completed) {
      doneCount++;
      if (rec.correct != null) totalCorrect += rec.correct;
      if (rec.total != null) totalAnswered += rec.total;
    }
  });
  document.getElementById('stat-done').textContent = doneCount;
  document.getElementById('stat-acc').textContent =
    totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) + '%' : '—';
}

// ---------- RANDOM MODE ----------
// Fisher-Yates shuffle using crypto.getRandomValues for true randomness
function cryptoShuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    const j = buf[0] % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startRandomMode(e) {
  if (!allWords.length) return;
  if (e) addRipple(document.querySelector('.btn-random-mode'), e);
  isRandomMode = true;
  currentGroup = null;
  // Pick RANDOM_COUNT truly random unique words from the entire pool
  const n = Math.min(RANDOM_COUNT, allWords.length);
  currentWords = cryptoShuffle(allWords).slice(0, n);
  currentIndex = 0;
  answers = [];
  revealed = false;
  const label = document.getElementById('quiz-group-label');
  label.textContent = '🎲 随机默写';
  label.className = 'quiz-group-label random-badge';
  document.getElementById('q-total').textContent = currentWords.length;
  show('screen-quiz');
  renderQuestion('right');
}

// ---------- QUIZ ----------
function startGroup(idx) {
  isRandomMode = false;
  currentGroup = idx;
  currentWords = getGroups()[idx];
  currentIndex = 0;
  answers = [];
  revealed = false;
  const label = document.getElementById('quiz-group-label');
  label.textContent = `Gruppo ${idx + 1}`;
  label.className = 'quiz-group-label';
  document.getElementById('q-total').textContent = currentWords.length;
  show('screen-quiz');
  renderQuestion('right');
}

function renderQuestion(dir) {
  const word = currentWords[currentIndex];
  const card = document.getElementById('quiz-card');
  card.className = 'quiz-card';
  document.getElementById('chinese-word').textContent = word.cn;
  document.getElementById('q-current').textContent = currentIndex + 1;
  document.getElementById('progress-fill').style.width =
    (currentIndex / currentWords.length * 100) + '%';
  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = 'answer-input';
  input.disabled = false;
  input.placeholder = 'Scrivi in italiano\u2026';
  document.getElementById('feedback-row').innerHTML = '';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-submit').style.display = '';
  revealed = false;
  card.classList.add(dir === 'right' ? 'slide-right' : 'slide-left');
  card.addEventListener('animationend', () => card.classList.remove('slide-right','slide-left'), { once: true });
  setTimeout(() => input.focus(), 180);
}

function handleSubmit(e) {
  if (revealed) { nextWord(); return; }
  addRipple(document.getElementById('btn-submit'), e);
  const input = document.getElementById('answer-input');
  const typed = input.value.trim().toLowerCase();
  const correct = currentWords[currentIndex].it.toLowerCase();
  const card = document.getElementById('quiz-card');
  if (!typed) {
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    return;
  }
  revealed = true;
  const isCorrect = checkAnswer(typed, correct);
  answers.push({ word: currentWords[currentIndex], typed, isCorrect });
  input.disabled = true;
  card.classList.add('revealed');
  document.getElementById('btn-next').style.display = '';
  document.getElementById('btn-submit').style.display = 'none';
  if (isCorrect) {
    input.className = 'answer-input correct-input';
    card.classList.add('correct');
    document.getElementById('feedback-row').innerHTML =
      '<span class="feedback-correct">Esatto!</span>';
    addPop(card);
  } else {
    input.className = 'answer-input wrong-input';
    card.classList.add('wrong');
    document.getElementById('feedback-row').innerHTML =
      `<span class="feedback-wrong">Sbagliato</span>
       <span class="correct-answer">\u2192 ${currentWords[currentIndex].it}</span>`;
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
  }
}

// ---------- ANSWER CHECK ----------
const ACCENT_MAP = {'à':'a','è':'e','é':'e','ì':'i','í':'i','î':'i','ò':'o','ó':'o','ù':'u','ú':'u','ü':'u'};
function toApostropheForm(s) {
  let r = '';
  for (const ch of s.toLowerCase())
    r += ACCENT_MAP[ch] ? ACCENT_MAP[ch] + "'" : ch;
  return r.replace(/''+/g, "'");
}
function stripAll(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/'/g,'');
}
function checkAnswer(typed, correct) {
  const t = typed.trim().toLowerCase();
  const c = correct.trim().toLowerCase();
  if (t === c) return true;
  if (t === toApostropheForm(c)) return true;
  if (stripAll(t) === stripAll(c)) return true;
  return false;
}

function nextWord() {
  currentIndex++;
  if (currentIndex >= currentWords.length) finishGroup();
  else renderQuestion('right');
}
function goBack() { show('screen-start'); }

// ---------- RESULT ----------
function finishGroup() {
  const correct = answers.filter(a => a.isCorrect).length;
  const total = answers.length;
  const pct = correct / total;

  // Only persist progress for regular group mode
  if (!isRandomMode) {
    const key = `group_${currentGroup}`;
    state[key] = { completed: true, accuracy: pct, correct, total };
    saveState();
    renderGroups();
    updateStats();
  }

  recordActivity(total);
  renderHeatmap();

  // ring animation
  const pctInt = Math.round(pct * 100);
  const circumference = 2 * Math.PI * 54; // 339.3
  const ringEl = document.getElementById('ring-fill');
  ringEl.className = 'ring-fill ' + (pct === 1 ? 'perfect' : pct >= 0.7 ? 'good' : pct >= 0.5 ? 'ok' : 'bad');
  document.getElementById('ring-pct').textContent = pctInt + '%';

  const titles = ['Dai, riprova!', 'Quasi!', 'Bene!', 'Molto bene!', 'Perfetto!'];
  const ti = pct === 1 ? 4 : pct >= 0.8 ? 3 : pct >= 0.6 ? 2 : pct >= 0.4 ? 1 : 0;
  document.getElementById('result-title').textContent = titles[ti];
  document.getElementById('result-detail').innerHTML =
    `<b>${correct}</b> corrette &nbsp;·&nbsp; <b>${total - correct}</b> sbagliate`;

  const wrongAnswers = answers.filter(a => !a.isCorrect);
  const wrongList = document.getElementById('wrong-list');
  if (wrongAnswers.length > 0) {
    wrongList.style.display = '';
    document.getElementById('wrong-items').innerHTML = wrongAnswers.map(a =>
      `<div class="wrong-item">
        <span class="wrong-cn">${a.word.cn}</span>
        <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span class="wrong-right">${a.word.it}</span>
          <span class="wrong-typed">${a.typed || '—'}</span>
        </span>
      </div>`).join('');
  } else {
    wrongList.style.display = 'none';
  }

  show('screen-result');

  // show/hide "再随机一次" button
  document.getElementById('btn-random-again').style.display = isRandomMode ? '' : 'none';

  // animate ring after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ringEl.style.strokeDashoffset = circumference * (1 - pct);
    });
  });

  if (pct === 1) launchConfetti();
}

function retryGroup() {
  if (isRandomMode) startRandomMode(null);
  else startGroup(currentGroup);
}
function goHome() { show('screen-start'); }

// ---------- SCREENS ----------
function show(id) {
  ['screen-start','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  const t = document.getElementById(id);
  t.style.display = 'flex';
  t.style.flexDirection = 'column';
}

// ---------- ANIMATIONS ----------
function addRipple(btn, e) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}
function addPop(el) {
  el.classList.add('pop');
  el.addEventListener('animationend', () => el.classList.remove('pop'), { once: true });
}
function launchConfetti() {
  const colors = ['#4a7c6f','#a8d5bb','#3d7a55','#c8e6d8','#7ab8a8','#f0f7f4'];
  for (let i = 0; i < 64; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.4 ? '50%' : '2px';
    p.style.width = p.style.height = (5 + Math.random() * 6) + 'px';
    p.style.animationDuration = (1.6 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.9) + 's';
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}


// ---------- HEATMAP ----------
// Activity log is stored separately and never cleared with progress cache
const LOG_KEY = 'dettato_log_v1';

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || {}; }
  catch { return {}; }
}
function saveLog(log) {
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
}

function recordActivity(wordsCount) {
  const log = loadLog();
  const today = todayKey();
  if (!log[today]) log[today] = { words: 0, sessions: 0 };
  log[today].words += wordsCount;
  log[today].sessions += 1;
  saveLog(log);
}

function renderHeatmap() {
  const log = loadLog();
  const grid = document.getElementById('heatmap-grid');
  const dayLabelsEl = document.getElementById('heatmap-day-labels');
  const streakEl = document.getElementById('heatmap-streak');
  if (!grid) return;

  // Italian month & day names
  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                     'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const MONTHS_SHORT = ['Gen','Feb','Mar','Apr','Mag','Giu',
                        'Lug','Ago','Set','Ott','Nov','Dic'];
  const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  // Start from June 1 of the current year
  const now = new Date();
  const startDate = new Date(now.getFullYear(), 5, 1); // June = month 5
  // If today is before June (shouldn't happen normally, but be safe)
  if (now < startDate) startDate.setFullYear(now.getFullYear() - 1);

  // max words for level scaling
  const allVals = Object.values(log).map(v => v.words || 0);
  const maxWords = allVals.length ? Math.max(...allVals, 1) : 1;

  function levelFor(words) {
    if (!words) return 0;
    const r = words / maxWords;
    if (r <= 0.25) return 1;
    if (r <= 0.5)  return 2;
    if (r <= 0.75) return 3;
    return 4;
  }

  // Build week columns from startDate to today
  // Align to the Sunday of the week containing startDate
  const gridStart = new Date(startDate);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay()); // back to Sunday

  grid.innerHTML = '';
  dayLabelsEl.innerHTML = '';

  // Day labels col: spacer for month row + 7 day labels (show Mon/Wed/Fri only)
  const spacer = document.createElement('div');
  spacer.style.height = '16px';
  dayLabelsEl.appendChild(spacer);
  for (let i = 0; i < 7; i++) {
    const lbl = document.createElement('div');
    lbl.className = 'heatmap-day-label';
    // show Lun(1), Mer(3), Ven(5) only
    lbl.textContent = (i === 1 || i === 3 || i === 5) ? DAYS_IT[i] : '';
    dayLabelsEl.appendChild(lbl);
  }

  // Walk week by week
  let colDate = new Date(gridStart);
  let lastShownMonth = -1;

  while (colDate <= now) {
    const col = document.createElement('div');
    col.className = 'heatmap-col';

    // Month label: show when the first day of a new month falls in this column
    const monthLabelEl = document.createElement('div');
    monthLabelEl.className = 'heatmap-col-label';
    let monthText = '';
    for (let i = 0; i < 7; i++) {
      const checkD = new Date(colDate);
      checkD.setDate(checkD.getDate() + i);
      if (checkD.getDate() === 1 && checkD.getMonth() !== lastShownMonth && checkD >= startDate) {
        monthText = MONTHS_SHORT[checkD.getMonth()];
        lastShownMonth = checkD.getMonth();
        break;
      }
    }
    // Also show label for very first column if it falls in June
    if (colDate <= gridStart && lastShownMonth === -1) {
      const m = startDate.getMonth();
      monthText = MONTHS_SHORT[m];
      lastShownMonth = m;
    }
    monthLabelEl.textContent = monthText;
    col.appendChild(monthLabelEl);

    // 7 day cells
    for (let dow = 0; dow < 7; dow++) {
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      const cellDate = new Date(colDate);
      cellDate.setDate(cellDate.getDate() + dow);

      if (cellDate > now || cellDate < startDate) {
        // out of range: render as faded empty, no tooltip
        cell.style.opacity = '0.3';
      } else {
        const key = cellDate.getFullYear() + '-'
          + String(cellDate.getMonth()+1).padStart(2,'0') + '-'
          + String(cellDate.getDate()).padStart(2,'0');
        const rec = log[key];
        const words = rec ? rec.words : 0;
        const level = levelFor(words);
        if (level > 0) cell.dataset.level = level;

        // tooltip in Italian
        const dayName = DAYS_IT[cellDate.getDay()];
        const dateStr = cellDate.getDate() + ' ' + MONTHS_SHORT[cellDate.getMonth()];
        cell.dataset.tip = words
          ? dayName + ' ' + dateStr + ' · ' + words + ' parole'
          : dayName + ' ' + dateStr;
      }
      col.appendChild(cell);
    }

    grid.appendChild(col);
    colDate.setDate(colDate.getDate() + 7);
  }

  // Scroll to the rightmost (most recent) position
  requestAnimationFrame(() => { grid.scrollLeft = grid.scrollWidth; });

  // Streak calculation (consecutive days with activity, ending today or yesterday)
  let streak = 0;
  const checkD = new Date(now);
  const todayK = todayKey();
  if (!log[todayK] || !log[todayK].words) checkD.setDate(checkD.getDate() - 1);
  while (true) {
    const k = checkD.getFullYear() + '-'
      + String(checkD.getMonth()+1).padStart(2,'0') + '-'
      + String(checkD.getDate()).padStart(2,'0');
    if (log[k] && log[k].words > 0) {
      streak++;
      checkD.setDate(checkD.getDate() - 1);
    } else break;
  }

  if (streak > 0) {
    streakEl.innerHTML = '<b>' + streak + '</b> ' + (streak === 1 ? 'giorno consecutivo' : 'giorni consecutivi');
  } else {
    streakEl.innerHTML = 'Inizia oggi!';
  }
}

// ---------- KEYBOARD ----------
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const quiz = document.getElementById('screen-quiz');
    if (quiz.style.display !== 'none') {
      if (revealed) nextWord();
      else document.getElementById('btn-submit').click();
    }
  }
});

loadWords();
</script>
